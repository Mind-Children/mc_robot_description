name: Pull Request

on:
  pull_request:
    branches: [main]
    paths:
      - "launch/**"
      - "meshes/**"
      - "rviz/**"
      - "scripts/**"
      - "urdfs/**"
      - "CMakeLists.txt"
      - "Dockerfile"
      - "entrypoint.sh"
      - "package.xml"
      - ".github/workflows/pr.yaml"
      - ".github/workflows/ci.yaml"

env:
  AWS_ROLE_ARN: arn:aws:iam::438465125180:role/GithubActionECR
  AWS_REGION: us-east-1
  ECR_REPOSITORY: 438465125180.dkr.ecr.us-east-1.amazonaws.com/mindchildren

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  build-pr-image:
    name: Build PR Test Image
    runs-on: Linux-x64
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker
        uses: ./.github/actions/setup-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GithubActionECR

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REPOSITORY }}/mc_robot_description
          tags: |
            type=ref,event=pr,prefix=pr-

      - name: Build and push PR test image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            BASE_IMAGE=${{ env.ECR_REPOSITORY }}/mc_one:main
          cache-from: |
            type=registry,ref=${{ env.ECR_REPOSITORY }}/mc_robot_description:buildcache-amd64
            type=gha
          cache-to: type=gha,mode=max

  docker-tests:
    name: Docker Container Tests
    runs-on: Linux-x64
    needs: build-pr-image
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker
        uses: ./.github/actions/setup-docker

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GithubActionECR

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull test image
        run: |
          docker pull ${{ needs.build-pr-image.outputs.image_tag }}
          docker tag ${{ needs.build-pr-image.outputs.image_tag }} mc_robot_description:test

      - name: Verify mc_robot_description build
        run: |
          docker run --rm mc_robot_description:test bash -c "
            source /opt/ros/jazzy/setup.bash && \
            source /ros2_ws/install/setup.bash && \
            ros2 pkg list | grep mc_robot_description
          "

      - name: Test executables are registered
        run: |
          docker run --rm mc_robot_description:test bash -c "
            source /opt/ros/jazzy/setup.bash && \
            source /ros2_ws/install/setup.bash && \
            ros2 pkg executables mc_robot_description | grep init_joint_states_once.py
          "

      - name: Verify installed assets
        run: |
          docker run --rm mc_robot_description:test bash -c "
            source /opt/ros/jazzy/setup.bash && \
            source /ros2_ws/install/setup.bash && \
            PKG_SHARE=\$(ros2 pkg prefix mc_robot_description)/share/mc_robot_description && \
            test -f \"\$PKG_SHARE/urdfs/mc_one.urdf\" && \
            test -f \"\$PKG_SHARE/rviz/animation.rviz\" && \
            test -d \"\$PKG_SHARE/meshes\" && \
            test -d \"\$PKG_SHARE/launch\"
          "

  cleanup-pr-image:
    name: Cleanup Current PR Image
    runs-on: ubuntu-latest
    needs: docker-tests
    if: always()
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GithubActionECR

      - name: Delete current PR image
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_TAG="pr-${PR_NUMBER}"

          IMAGE_DIGEST=$(aws ecr describe-images \
            --repository-name mindchildren/mc_robot_description \
            --image-ids imageTag=${PR_TAG} \
            --query 'imageDetails[0].imageDigest' \
            --output text 2>/dev/null || echo "")

          if [ ! -z "$IMAGE_DIGEST" ] && [ "$IMAGE_DIGEST" != "None" ]; then
            aws ecr batch-delete-image \
              --repository-name mindchildren/mc_robot_description \
              --image-ids imageDigest=$IMAGE_DIGEST \
              && echo "Successfully deleted PR image: ${PR_TAG}" \
              || echo "Failed to delete PR image: ${PR_TAG}"
          fi
        continue-on-error: true
