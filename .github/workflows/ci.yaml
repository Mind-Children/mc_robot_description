name: CI

on:
  push:
    branches: [main, dev, ci]
    tags:
      - "*" # Trigger on all tags
    paths:
      - "launch/**"
      - "meshes/**"
      - "rviz/**"
      - "scripts/**"
      - "urdfs/**"
      - "CMakeLists.txt"
      - "Dockerfile"
      - "entrypoint.sh"
      - "package.xml"
      - ".github/workflows/ci.yaml"
  pull_request:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [mc-one-updated]

env:
  AWS_ROLE_ARN: arn:aws:iam::438465125180:role/GithubActionECR
  AWS_REGION: us-east-1
  ECR_REPOSITORY: 438465125180.dkr.ecr.us-east-1.amazonaws.com/mindchildren

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout
  pull-requests: write

jobs:
  check-changes:
    name: Check Changed Files
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.set-output.outputs.code_changed }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        continue-on-error: true
        with:
          filters: |
            code:
              - 'launch/**'
              - 'meshes/**'
              - 'rviz/**'
              - 'scripts/**'
              - 'urdfs/**'
              - 'CMakeLists.txt'
              - 'Dockerfile'
              - 'entrypoint.sh'
              - 'package.xml'

      - name: Set output
        id: set-output
        run: |
          if [ "${{ steps.filter.outputs.code }}" == "true" ]; then
            echo "code_changed=true" >> $GITHUB_OUTPUT
          elif [ "${{ steps.filter.outcome }}" == "failure" ]; then
            echo "code_changed=true" >> $GITHUB_OUTPUT
          else
            echo "code_changed=false" >> $GITHUB_OUTPUT
          fi

  build:
    runs-on: ${{ matrix.runner }}
    needs: [check-changes]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    strategy:
      matrix:
        include:
          - platform: linux/arm64
            runner: Linux-ARM64
            arch: arm64
          - platform: linux/amd64
            runner: Linux-x64
            arch: amd64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker
        uses: ./.github/actions/setup-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GithubActionECR

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.arch }}
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          cache-from: |
            type=registry,ref=${{ env.ECR_REPOSITORY }}/mc_robot_description:buildcache-${{ matrix.arch }}
            type=gha
          cache-to: type=registry,ref=${{ env.ECR_REPOSITORY }}/mc_robot_description:buildcache-${{ matrix.arch }},mode=max
          build-args: |
            BUILDPLATFORM=${{ matrix.platform }}
            BASE_IMAGE=${{ env.ECR_REPOSITORY }}/mc_one:main
          outputs: type=image,name=${{ env.ECR_REPOSITORY }}/mc_robot_description,push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          DIGEST_DIR="/tmp/digests-${{ github.run_id }}"
          mkdir -p "$DIGEST_DIR"
          digest="${{ steps.build.outputs.digest }}"
          touch "$DIGEST_DIR/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests-${{ github.run_id }}/*
          if-no-files-found: error
          retention-days: 1

      - name: Cleanup digest directory
        if: always()
        run: rm -rf /tmp/digests-${{ github.run_id }}

  merge:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests-${{ github.run_id }}
          pattern: digests-*
          merge-multiple: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GithubActionECR

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REPOSITORY }}/mc_robot_description
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=ref,event=tag
            type=ref,event=branch

      - name: Create manifest list and push
        working-directory: /tmp/digests-${{ github.run_id }}
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.ECR_REPOSITORY }}/mc_robot_description@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.ECR_REPOSITORY }}/mc_robot_description:${{ steps.meta.outputs.version }}

      - name: Cleanup digest directory
        if: always()
        run: rm -rf /tmp/digests-${{ github.run_id }}
